service: daplanstan
image: geertclaes/daplanstan

servers:
  web:
    - remote.kwokah.com

proxy:
  ssl: false
  hosts:
    - whats.daplanstan.com
  healthcheck:
    path: /up
    interval: 5
    timeout: 10

deploy_timeout: 90

registry:
  username: geertclaes
  password:
    - KAMAL_REGISTRY_PASSWORD

env:
  secret:
    - RAILS_MASTER_KEY
    - GOOGLE_CLIENT_ID
    - GOOGLE_CLIENT_SECRET
    - POSTMARK_API_TOKEN
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT
    - RAILS_INBOUND_EMAIL_PASSWORD
    - ANTHROPIC_API_KEY
    - PEXELS_API_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
    TRIP_EMAIL_DOMAIN: mail.daplanstan.com

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

volumes:
  - "daplanstan_storage:/rails/storage"

asset_path: /rails/public/assets

builder:
  arch: amd64

ssh:
  user: tripel